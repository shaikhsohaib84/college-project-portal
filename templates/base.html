<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <title>College Project Portal</title>

    <!-- Bootstrap 5.3 (supports dark mode) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

class="bg-light"
    
<nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">College Portal</a>

        <div class="ms-auto d-flex align-items-center gap-3">
            
            <!-- Theme Toggle Button -->
            <button id="themeToggle" class="btn btn-outline-secondary btn-sm">
                Dark Mode
            </button>

            {% if user.is_authenticated %}
                <span class="fw-semibold">
                    {{ user.username }}
                </span>



                <form method="post" action="{% url 'logout' %}" style="display:inline;">
                                 {% csrf_token %}
                        <button type="submit" class="btn btn-outline-danger btn-sm">
                                            Logout
                        </button>
                    </form>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<script>
    const toggleBtn = document.getElementById("themeToggle");
    const htmlTag = document.documentElement;

    const savedTheme = localStorage.getItem("theme");

    if (savedTheme) {
        htmlTag.setAttribute("data-bs-theme", savedTheme);
        toggleBtn.innerText = savedTheme === "dark" ? "Light Mode" : "Dark Mode";
    }

    toggleBtn.addEventListener("click", () => {
        let currentTheme = htmlTag.getAttribute("data-bs-theme");
        let newTheme = currentTheme === "light" ? "dark" : "light";

        htmlTag.setAttribute("data-bs-theme", newTheme);
        localStorage.setItem("theme", newTheme);

        toggleBtn.innerText = newTheme === "dark" ? "Light Mode" : "Dark Mode";
    });
</script>

</body>
</html>
